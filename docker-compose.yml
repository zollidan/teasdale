version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: teasdale-postgres
    hostname: postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teasdale_user"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - teasdale-network

  # postgresus:
  #   container_name: postgresus
  #   image: rostislavdugin/postgresus:latest
  #   ports:
  #     - "4005:4005"
  #   volumes:
  #     - ./postgresus-data:/postgresus-data
  #   restart: unless-stopped
volumes:
  pgdata:
    driver: local

networks:
  teasdale-network:
    driver: bridge
